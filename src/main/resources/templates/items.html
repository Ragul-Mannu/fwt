<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Food Waste Tracker 🍎</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: "Poppins", sans-serif;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
        height: 100vh;
        animation: bgMove 20s infinite alternate ease-in-out;
      }
      @keyframes bgMove {
        from {
          background-position: 0 0;
        }
        to {
          background-position: 100% 100%;
        }
      }
      h1 {
        text-align: center;
        color: #ffffff;
        margin-top: 25px;
        font-size: 2rem;
        text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      }
      .container {
        background: rgba(255, 255, 255, 0.95);
        width: 450px;
        margin: 40px auto;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
        position: relative;
        z-index: 2;
      }
      input,
      button,
      select {
        width: 85%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 15px;
        outline: none;
      }
      input:focus {
        border-color: #4a90e2;
      }
      button {
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
      }
      .btn-scan {
        background: #007bff;
        color: white;
      }
      .btn-scan:hover {
        background: #0056b3;
      }
      .btn-upload {
        background: #ffd700;
      }
      .btn-upload:hover {
        background: #e6c200;
      }
      .btn-voice {
        background: #ff5e5e;
        color: white;
      }
      .btn-voice:hover {
        background: #d43f3f;
      }
      .btn-submit {
        background: #2b5797;
        color: white;
      }
      .btn-submit:hover {
        background: #1e3d73;
      }
      #emojiDisplay {
        font-size: 40px;
        margin-top: 10px;
      }
      .falling-food {
        position: absolute;
        top: -50px;
        animation: fall 8s linear infinite;
        z-index: 1;
      }
      @keyframes fall {
        0% {
          transform: translateY(-100px) rotate(0deg);
          opacity: 0;
        }
        50% {
          opacity: 1;
        }
        100% {
          transform: translateY(100vh) rotate(360deg);
          opacity: 0;
        }
      }
      table {
        width: 90%;
        margin: 30px auto;
        border-collapse: collapse;
        background: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      th {
        background-color: #4a90e2;
        color: white;
        padding: 10px;
      }
      td {
        text-align: center;
        padding: 10px;
        border-bottom: 1px solid #ddd;
      }
      tr:hover {
        background-color: #f2f2f2;
      }
    </style>
  </head>
  <body>
    <h1>🍏 Food Waste Tracker</h1>

    <div class="container">
      <form
        th:action="@{/food/add}"
        method="post"
        enctype="multipart/form-data"
        th:object="${newItem}"
      >
        <input
          type="text"
          id="foodName"
          th:field="*{name}"
          placeholder="Food Name"
          required
        />
        <input type="date" id="expiryDate" th:field="*{expiryDate}" required />
        <div id="emojiDisplay"></div>

        <button
          type="button"
          class="btn-voice"
          onclick="startVoiceInput('name')"
        >
          🎤 Food Name
        </button>
        <button
          type="button"
          class="btn-voice"
          onclick="startVoiceInput('date')"
        >
          🎤 Expiry Date
        </button>
        <button type="button" class="btn-scan" onclick="startScanner()">
          📷 Scan Barcode
        </button>

        <label for="fileUpload" class="btn-upload"
          >📤 Upload Barcode / Product Image</label
        >
        <input type="file" id="fileUpload" name="file" style="display: none" />

        <button type="submit" class="btn-submit">✅ Add Item</button>
      </form>
    </div>

    <table>
      <tr>
        <th>Food</th>
        <th>Expiry</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
      <tr th:each="item : ${items}">
        <td th:text="${item.emoji} + ' ' + ${item.name}"></td>
        <td th:text="${item.expiryDate}"></td>
        <td th:text="${item.status}"></td>
        <td>
          <form
            th:if="${item.status.contains('⚠️')}"
            th:action="@{'/food/notify/' + ${item.id}}"
            method="post"
          >
            <button
              type="submit"
              style="
                background: orange;
                border: none;
                padding: 5px 10px;
                cursor: pointer;
              "
            >
              📩 Send SMS
            </button>
          </form>
        </td>
      </tr>
    </table>

    <script>
      // Falling food emojis
      const emojis = [
        "🍎",
        "🍌",
        "🍊",
        "🍕",
        "🥛",
        "🍞",
        "🍗",
        "🥦",
        "🍰",
        "🍫",
      ];
      for (let i = 0; i < 15; i++) {
        const food = document.createElement("div");
        food.classList.add("falling-food");
        food.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        food.style.left = Math.random() * 100 + "vw";
        food.style.fontSize = Math.random() * 25 + 20 + "px";
        food.style.animationDuration = 5 + Math.random() * 5 + "s";
        document.body.appendChild(food);
      }

      // Emoji mapping
      const emojiMap = {
        apple: "🍎",
        banana: "🍌",
        orange: "🍊",
        milk: "🥛",
        bread: "🍞",
        rice: "🍚",
        egg: "🥚",
        cheese: "🧀",
        chicken: "🍗",
        fish: "🐟",
        tomato: "🍅",
        potato: "🥔",
        carrot: "🥕",
        pizza: "🍕",
        burger: "🍔",
        cake: "🍰",
        chocolate: "🍫",
      };

      function updateEmojiDisplay(foodName) {
        const lower = foodName.toLowerCase();
        let emoji = "🍽️";
        for (const key in emojiMap) {
          if (lower.includes(key)) {
            emoji = emojiMap[key];
            break;
          }
        }
        document.getElementById("emojiDisplay").textContent = emoji;
      }

      // Voice input (food name or date)
      function startVoiceInput(type) {
        const SpeechRecognition =
          window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          alert("Your browser doesn't support speech recognition.");
          return;
        }
        const recognition = new SpeechRecognition();
        recognition.lang = "en-US";
        recognition.start();

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript;
          if (type === "name") {
            document.getElementById("foodName").value = transcript;
            updateEmojiDisplay(transcript);
          } else if (type === "date") {
            document.getElementById("expiryDate").value =
              parseSpokenDate(transcript);
          }
        };
      }

      function parseSpokenDate(spoken) {
        const parts = spoken.match(/(\d{4})[^\d]?(\d{1,2})[^\d]?(\d{1,2})/);
        if (parts)
          return `${parts[1]}-${parts[2].padStart(2, "0")}-${parts[3].padStart(
            2,
            "0"
          )}`;
        return null;
      }
    </script>
  </body>
</html>
