<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Waste Tracker</title>

    <style>
      /* ============ BASE STYLE ============ */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #e3f2fd, #bbdefb, #e1f5fe);
        color: #1a237e;
        overflow-x: hidden;
        min-height: 100vh;
        position: relative;
        cursor: crosshair;
      }

      /* ============ HEADER ============ */
      header {
        text-align: center;
        padding: 40px 10px 20px;
        z-index: 2;
        position: relative;
      }

      header h1 {
        font-size: 2.8rem;
        color: #0d47a1;
        text-shadow: 2px 2px 8px rgba(33, 150, 243, 0.3);
      }

      header p {
        color: #1565c0;
        font-size: 1.1rem;
        font-weight: 500;
      }

      /* ============ FORM CONTAINER ============ */
      .form-container {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        width: 90%;
        max-width: 480px;
        margin: 40px auto;
        padding: 30px;
        text-align: center;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        z-index: 2;
        transition: transform 0.3s ease;
      }

      .form-container:hover {
        transform: translateY(-5px);
      }

      input,
      button {
        width: 85%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 10px;
        border: 1px solid #b0bec5;
        font-size: 15px;
        transition: all 0.3s ease;
      }

      input:focus {
        border-color: #42a5f5;
        box-shadow: 0 0 8px rgba(66, 165, 245, 0.4);
        outline: none;
      }

      button {
        border: none;
        cursor: pointer;
        color: white;
        font-weight: 600;
        border-radius: 10px;
        transition: 0.3s ease;
      }

      button:hover {
        transform: scale(1.05);
      }

      .mic-btn {
        background: linear-gradient(135deg, #ef5350, #e53935);
      }

      .mic-btn:hover {
        background: linear-gradient(135deg, #e53935, #c62828);
      }

      .scan-btn {
        background: linear-gradient(135deg, #26a69a, #00897b);
      }

      .scan-btn:hover {
        background: linear-gradient(135deg, #00897b, #00695c);
      }

      .add-btn {
        background: linear-gradient(135deg, #42a5f5, #1e88e5);
      }

      .add-btn:hover {
        background: linear-gradient(135deg, #1e88e5, #1565c0);
      }

      .emoji {
        font-size: 45px;
        margin: 12px 0;
      }

      /* ============ TABLE ============ */
      table {
        width: 85%;
        margin: 30px auto;
        border-collapse: collapse;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 6px 25px rgba(0, 0, 0, 0.1);
        z-index: 2;
      }

      th,
      td {
        padding: 12px;
        text-align: center;
        border-bottom: 1px solid #e3f2fd;
      }

      th {
        background-color: #2196f3;
        color: white;
      }

      tr:hover {
        background-color: #f1f8e9;
      }

      .notify-btn {
        background: linear-gradient(135deg, #ffb74d, #fb8c00);
        border: none;
        border-radius: 8px;
        padding: 6px 10px;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }

      .notify-btn:hover {
        transform: scale(1.1);
        background: linear-gradient(135deg, #fb8c00, #ef6c00);
      }

      /* ============ FALLING FOOD ============ */
      .food {
        position: fixed;
        top: -10vh;
        z-index: 1;
        animation: fall linear forwards;
        filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.15));
      }

      @keyframes fall {
        0% {
          transform: translateY(-10vh) translateX(0);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        100% {
          transform: translateY(110vh) translateX(calc(var(--drift, 1) * 30px));
          opacity: 0;
        }
      }

      .mic-active {
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(239, 83, 80, 0.4);
        }
        70% {
          box-shadow: 0 0 0 15px rgba(239, 83, 80, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(239, 83, 80, 0);
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Food Waste Tracker</h1>
      <p>Track • Save • Sustain • Enjoy</p>
    </header>

    <div class="form-container">
      <!-- ✅ Corrected form action to match your controller mapping -->
      <form th:action="@{/items/add}" method="post" th:object="${newItem}">
        <input
          type="text"
          id="foodName"
          th:field="*{name}"
          placeholder="Enter Food Name"
          required
        />
        <input type="date" id="expiryDate" th:field="*{expiryDate}" required />
        <div id="emojiDisplay" class="emoji">🍽️</div>

        <button
          id="nameMic"
          type="button"
          class="mic-btn"
          onclick="startVoiceInput('name', this)"
        >
          🎤 Speak Food Name
        </button>

        <button
          id="dateMic"
          type="button"
          class="mic-btn"
          onclick="startVoiceInput('date', this)"
        >
          🗓️ Speak Expiry Date
        </button>

        <button type="button" class="scan-btn" onclick="startScanner()">
          📷 Scan Barcode
        </button>

        <button type="submit" class="add-btn">➕ Add Food</button>
      </form>
    </div>

    <table>
      <tr>
        <th>Food</th>
        <th>Expiry</th>
        <th>Status</th>
        <th>Action</th>
      </tr>

      <tr th:each="item : ${items}">
        <td th:text="${item.emoji} + ' ' + ${item.name}"></td>
        <td th:text="${item.expiryDate}"></td>
        <td th:text="${item.status}"></td>
        <td>
          <a
            th:href="@{'/items/delete/' + ${item.id}}"
            class="notify-btn"
            style="background: linear-gradient(135deg, #ef5350, #d32f2f)"
            >🗑️ Delete</a
          >
        </td>
      </tr>
    </table>

    <script>
      /* ===== Falling Emoji Animation ===== */
      const emojis = [
        "🍎",
        "🍌",
        "🍕",
        "🍔",
        "🥕",
        "🍦",
        "🍇",
        "🍫",
        "🥩",
        "🍰",
      ];

      function createFallingEmoji() {
        const emoji = document.createElement("span");
        emoji.classList.add("food");
        emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        emoji.style.left = Math.random() * 100 + "vw";
        emoji.style.fontSize = 25 + Math.random() * 30 + "px";
        emoji.style.animationDuration = 5 + Math.random() * 5 + "s";
        emoji.style.opacity = 0.9;
        emoji.style.filter = `drop-shadow(0 0 8px rgba(33,150,243,${
          0.4 + Math.random() * 0.4
        }))`;
        emoji.style.setProperty("--drift", Math.random() > 0.5 ? 1 : -1);
        document.body.appendChild(emoji);

        emoji.addEventListener("animationend", () => {
          emoji.remove();
          createFallingEmoji();
        });
      }

      for (let i = 0; i < 25; i++) {
        setTimeout(createFallingEmoji, i * 300);
      }

      /* ===== Emoji Display ===== */
      const emojiMap = {
        apple: "🍎",
        banana: "🍌",
        orange: "🍊",
        milk: "🥛",
        bread: "🍞",
        rice: "🍚",
        egg: "🥚",
        cheese: "🧀",
        chicken: "🍗",
        fish: "🐟",
        meat: "🥩",
        tomato: "🍅",
        potato: "🥔",
        carrot: "🥕",
        pizza: "🍕",
        burger: "🍔",
        cake: "🍰",
        chocolate: "🍫",
        ice: "🍨",
        water: "💧",
        coffee: "☕",
      };

      function updateEmojiDisplay(foodName) {
        const lower = foodName.toLowerCase();
        let emoji = "🍽️";
        for (const key in emojiMap) {
          if (lower.includes(key)) {
            emoji = emojiMap[key];
            break;
          }
        }
        document.getElementById("emojiDisplay").textContent = emoji;
      }

      document
        .getElementById("foodName")
        .addEventListener("input", (e) => updateEmojiDisplay(e.target.value));

      /* ===== Voice Input ===== */
      function startVoiceInput(type, btn) {
        if (!("webkitSpeechRecognition" in window)) {
          alert("❌ Speech recognition not supported in this browser.");
          return;
        }

        const recognition = new webkitSpeechRecognition();
        recognition.lang = "en-US";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.start();
        btn.classList.add("mic-active");

        recognition.onstart = () => {
          btn.textContent = "🎙️ Listening...";
        };

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript;
          if (type === "name") {
            document.getElementById("foodName").value = transcript;
            updateEmojiDisplay(transcript);
          } else if (type === "date") {
            const parsedDate = parseSpokenDate(transcript);
            if (parsedDate)
              document.getElementById("expiryDate").value = parsedDate;
            else
              alert(
                "⚠️ Couldn't understand date. Try saying like '2025 November 9'"
              );
          }
        };

        recognition.onerror = (event) => {
          alert("⚠️ Voice recognition error: " + event.error);
        };

        recognition.onend = () => {
          btn.textContent =
            type === "name" ? "🎤 Speak Food Name" : "🗓️ Speak Expiry Date";
          btn.classList.remove("mic-active");
        };
      }

      function parseSpokenDate(spoken) {
        const months = {
          january: 1,
          february: 2,
          march: 3,
          april: 4,
          may: 5,
          june: 6,
          july: 7,
          august: 8,
          september: 9,
          october: 10,
          november: 11,
          december: 12,
        };

        spoken = spoken.toLowerCase();
        const match = spoken.match(
          /(\d{1,2})\s*(?:th|st|nd|rd)?\s*([a-zA-Z]+)\s*(\d{4})?/
        );
        if (match) {
          const day = match[1].padStart(2, "0");
          const month = months[match[2]] || "01";
          const year = match[3] || new Date().getFullYear();
          return `${year}-${month.toString().padStart(2, "0")}-${day}`;
        }
        return null;
      }

      /* ===== Scanner Placeholder ===== */
      function startScanner() {
        alert("📷 Barcode scanning coming soon!");
      }
    </script>
  </body>
</html>
